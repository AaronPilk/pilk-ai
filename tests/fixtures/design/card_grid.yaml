            body: Second card blurb.
      - id: cg-c
        settings:
          flex_direction: {mobile: column}
          gap: {mobile: 8}
          padding: {mobile: {top: 24, right: 16, bottom: 24, left: 16}}
          margin: {mobile: {top: 0, right: 0, bottom: 0, left: 0}}
