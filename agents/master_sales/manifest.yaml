sandbox:
  type: process
  profile: sales_ops_agent

policy:
  budget:
    per_run_usd: 5.00
    daily_usd: 25.00

memory_namespace: master_sales

preferred_tier: standard

integrations:
  - name: google
    kind: oauth
    role: user
    label: Google (Gmail for outbound + threading)
    scopes:
      - https://www.googleapis.com/auth/gmail.send
      - https://www.googleapis.com/auth/gmail.readonly
      - https://www.googleapis.com/auth/gmail.compose
      - https://www.googleapis.com/auth/gmail.modify
  - name: ghl_api_key
    kind: api_key
    label: Go High Level — Private Integration Token
    docs_url: https://help.gohighlevel.com/support/solutions/articles/155000002573-private-integrations
  - name: ghl_default_location_id
    kind: api_key
    label: Go High Level — default location id
    docs_url: https://help.gohighlevel.com/support/solutions/articles/155000002573-private-integrations
  - name: hunter_io_api_key
    kind: api_key
    label: Hunter.io API key (email discovery)
    docs_url: https://hunter.io/api-keys
  - name: google_places_api_key
    kind: api_key
    label: Google Places API key (prospect search)
    docs_url: https://developers.google.com/maps/documentation/places/web-service/get-api-key
  - name: pagespeed_api_key
    kind: api_key
    label: PageSpeed Insights API key (site audit)
    docs_url: https://developers.google.com/speed/docs/insights/v5/get-started
