sandbox:
  type: process
  profile: creative_agent

policy:
  budget:
    per_run_usd: 8.00
    daily_usd: 40.00

memory_namespace: master_content

preferred_tier: standard

integrations:
  - name: google
    kind: oauth
    role: user
    label: Google (Gmail for creator outreach)
    scopes:
      - https://www.googleapis.com/auth/gmail.send
      - https://www.googleapis.com/auth/gmail.compose
      - https://www.googleapis.com/auth/gmail.readonly
  - name: nano_banana_api_key
    kind: api_key
    label: Nano Banana / Gemini image generation
    docs_url: https://ai.google.dev/gemini-api/docs
  - name: higgsfield_api_key
    kind: api_key
    label: Higgsfield (motion video)
    docs_url: https://higgsfield.ai
  - name: arcads_api_key
    kind: api_key
    label: Arcads (UGC video generation)
    docs_url: https://external-api.arcads.ai/docs
  - name: apify_api_token
    kind: api_key
    label: Apify (creator discovery — IG / TikTok)
    docs_url: https://docs.apify.com/api/v2
  - name: hunter_io_api_key
    kind: api_key
    label: Hunter.io (creator email lookup)
    docs_url: https://hunter.io/api-keys
