  - memory_remember

sandbox:
  type: process
  profile: morning_brief_agent

policy:
  budget:
    per_run_usd: 2.50
    daily_usd: 12.00

memory_namespace: master_reporting

preferred_tier: standard

integrations:
  - name: google
    kind: oauth
    role: user
    label: Google (Gmail + Calendar + Drive read)
    scopes:
      - https://www.googleapis.com/auth/gmail.readonly
      - https://www.googleapis.com/auth/gmail.send
      - https://www.googleapis.com/auth/calendar.readonly
      - https://www.googleapis.com/auth/drive.readonly
      - https://www.googleapis.com/auth/spreadsheets
  - name: ghl_api_key
    kind: api_key
    label: Go High Level — Private Integration Token
    docs_url: https://help.gohighlevel.com/support/solutions/articles/155000002573-private-integrations
  - name: ghl_default_location_id
    kind: api_key
    label: Go High Level — default location id
  - name: telegram_bot_token
    kind: api_key
    label: Telegram bot token
    docs_url: https://core.telegram.org/bots#botfather
