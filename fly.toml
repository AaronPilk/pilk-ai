app = "pilk-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PILK_HOME = "/data"
  PILK_HOST = "0.0.0.0"
  PILK_PORT = "8080"
  PILK_CLOUD = "1"
  PILK_LOG_LEVEL = "INFO"

[mounts]
  source = "pilk_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
